services:
  scales-app:
    build: .
    container_name: scales
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      # Use an absolute URL for your homelab deployment
      - WEBSITE_URL=http://localhost:3000
      # Path to the SQLite database on the volume mount
      - DATABASE_URL=file:/app/data/scales.db
      - NODE_ENV=production
